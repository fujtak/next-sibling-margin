<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate next sibling margin</title>
  <link rel="stylesheet" href="./main.css">
</head>
<body>
  <h1>Generate next sibling margin</h1>

  <h2>Component</h2>
  <label>css selector: <input type="text" placeholder=".example" required data-css-generator-component="selector"></label>

  <h2>Next components</h2>
  <div data-next-component-add="wrapper"></div>
  <button data-next-component-add="trigger">Add</button>

  <h2>CSS Code</h2>
  <code data-css-generator="display"></code>
  <button data-css-generator="trigger">Generate</button>

  <template data-next-component-add="template">
    <div data-css-generator-next="root">
      <label>css selector: <input type="text" placeholder=".example" required data-css-generator-next="selector"></label>
      <label><span>🔝</span>margin-top: <input type="number" value="0" min="0" required data-css-generator-next="margin">px</label>
    </div>
  </template>

  <script src="./js/main.js" type="module"></script>
</body>
</html>
