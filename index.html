<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate next sibling margin-top</title>
  <link rel="stylesheet" href="./main.css">
  <meta name="google-site-verification" content="H69tkdwQKngMf50TAgeNunnLq5Kbu_s1qZwfDGV6mAw" />
  <!-- <meta http-equiv="content-security-policy" content="default-src 'self'" /> -->
</head>
<body>
  <main>
    <h1>Generate next sibling margin-top🧱</h1>

    <label>css selector: <input type="text" placeholder=".example" required data-component-main="selector"></label>

    <h2>Next siblings</h2>
    <div data-next-component-add="wrapper"></div>
    <button data-next-component-add="trigger">Add</button>

    <h2>CSS Code</h2>
    <code data-display="wrapper"></code>
    <button data-generator="trigger" disabled>Generate</button>

    <h2>Share URL</h2>
    <p data-share-display="wrapper"></p>
  
    <template data-next-component-add="template">
      <div data-next="root">
        <label>css selector: <input type="text" placeholder=".example" required data-next="selector"></label>
        <label><span>🔝</span>margin-top: <input type="number" value="0" min="0" required data-next="margin">px</label>
      </div>
    </template>
  </main>

  <footer>
    contact: <a href="mailto:takuya.fujimaki.develop@gmail.com">takuya.fujimaki.develop@gmail.com</a>
  </footer>

  <script src="./js/main.js" type="module"></script>
</body>
</html>
