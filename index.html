<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Share next sibling margin-top🧱</title>
  <link rel="stylesheet" href="./main.css">
  <meta name="google-site-verification" content="H69tkdwQKngMf50TAgeNunnLq5Kbu_s1qZwfDGV6mAw" />
  <meta http-equiv="content-security-policy" content="default-src 'self'" />
</head>
<body>
  <main>
    <section>
      <h1>Share next sibling margin-top🧱</h1>
      <label>css selector: <input type="text" placeholder=".example" required data-component-main="selector"></label>
    </section>

    <section>
      <h2>Next siblings</h2>
      <div data-next-component-add="wrapper"></div>
      <button data-next-component-add="trigger">Add</button>
    </section>

    <section class="section-share" data-display="root">
      <h2>CSS & Share URL</h2>
      <code data-code-display="wrapper"></code>
      <p data-share-display="wrapper"></p>
    </section>
  
    <template data-next-component-add="template">
      <div data-next="root">
        <label>css selector: <input type="text" placeholder=".example" required data-next="selector"></label>
        <label><span>🔝</span>margin-top(PC): <input type="number" value="0" min="0" required data-next="marginPc">px</label>
        <label><span>🔝</span>margin-top(SP): <input type="number" value="0" min="0" required data-next="marginSp">px</label>
      </div>
    </template>
  </main>

  <script src="./js/main.js" type="module"></script>
</body>
</html>
